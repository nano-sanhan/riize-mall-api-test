name: RIIZE商城接口自动化测试

on:
  push:
    branches: [ main ]

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Newman 和 HTML 报告器
        run: |
          npm install -g newman
          npm install -g newman-reporter-html

      - name: 安装 Java 17 (适配 Spring Boot 项目)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 启动商城服务 (Maven)
        run: |
          # 后台启动 Spring Boot 服务
          nohup mvn spring-boot:run &
          # 等待服务启动（Spring Boot 一般需要 60 秒）
          sleep 60
          # 验证服务是否启动成功
          curl -f http://localhost:8082 || exit 1

      - name: 运行接口测试
        run: newman run "RIIZE商城接口自动化.postman_collection.json" \
          --reporters cli,html \
          --reporter-html-export newman-report.html

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html
