name: 商城接口自动化测试

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 启动 MySQL 容器
        run: |
          docker run -d \
            --name mysql-test \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=shoppingstore \
            -p 3306:3306 \
            mysql:8.0
          # 等待 MySQL 完全启动
          sleep 30

      - name: 导入建表 SQL
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot shoppingstore < src/sql/shoppingstore.sql

      - name: 打包 war
        run: mvn clean package -DskipTests

      - name: 下载 Tomcat 9
        run: |
          wget https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.111/bin/apache-tomcat-9.0.111.tar.gz
          tar xf apache-tomcat-9.0.111.tar.gz

      - name: 修改 Tomcat 端口为 8082
        run: |
          sed -i 's/port="8080"/port="8082"/g' apache-tomcat-9.0.111/conf/server.xml

      - name: 部署 war（强制改名为 ShoppingStore_war.war）
        run: |
          cp target/*.war apache-tomcat-9.0.111/webapps/ShoppingStore_war.war

      - name: 启动 Tomcat
        run: |
          nohup apache-tomcat-9.0.111/bin/startup.sh &
          sleep 90

      - name: 检查服务是否启动
        run: curl -f http://localhost:8082/ShoppingStore_war || exit 1

      - name: 安装 Newman
        run: npm install -g newman newman-reporter-html

      - name: 运行接口测试
        run: |
          newman run "RIIZE商城接口自动化.postman_collection.json" \
            --reporters cli,html \
            --reporter-html-export report.html
