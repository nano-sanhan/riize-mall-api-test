name: 商城接口自动化测试

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 打包 war
        run: mvn clean package -DskipTests

      - name: 下载 Tomcat 9
        run: |
          wget https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.111/bin/apache-tomcat-9.0.111.tar.gz
          tar xf apache-tomcat-9.0.111.tar.gz

      - name: 部署 war
        run: |
          cp target/*.war apache-tomcat-9.0.111/webapps/shoppingstore.war

      - name: 启动 Tomcat
        run: |
          nohup apache-tomcat-9.0.111/bin/startup.sh &
          sleep 70

      - name: 检查服务是否启动成功
        run: curl -f http://localhost:8080/shoppingstore || exit 1

      - name: 安装 Newman
        run: npm install -g newman newman-reporter-html

      - name: 运行接口测试
        run: |
          newman run "RIIZE商城接口自动化.postman_collection.json" \
            --reporters cli,html \
            --reporter-html-export report.html
